spring:
  application:
    name: authuser
  datasource:
    url: jdbc:postgresql://localhost:15432/authuser
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.PostgreSQLDialect
      jdbc:
        lob-non-contextual-creation: true
    properties:
      hibernate:
        show_sql: true

server:
  port: 8087
